name: 24/7 Infinite Relay Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [keep_alive] # আগের অ্যাকশন এই ইভেন্টকে কল করে নতুন অ্যাকশন চালু করবে

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bot and Trigger Next
        env:
          PYTHONUNBUFFERED: 1
        run: |
          # বটকে ব্যাকগ্রাউন্ডে রান করা হচ্ছে
          python main.py &
          
          # ঠিক ৫ ঘণ্টা (১৮০০০ সেকেন্ড) অপেক্ষা করবে
          sleep 18000
          
          # ৫ ঘণ্টা পর API এর মাধ্যমে নতুন করে আরেকটি অ্যাকশন চালু করবে
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
          -H 'Accept: application/vnd.github.everest-preview+json' \
          -H 'Authorization: token ${{ secrets.GH_PAT }}' \
          --data '{"event_type": "keep_alive"}'
